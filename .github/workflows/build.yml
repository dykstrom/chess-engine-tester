name: build

on:
  push:
    branches: [ main, dev, matrix-build ]
  pull_request:
    branches: [ main, dev ]
  workflow_dispatch:

jobs:
  build:
    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-x86_64
            os: windows-latest
          - platform: macos-arm64
            os: macos-latest
          - platform: linux-x86_64
            os: ubuntu-latest
          - platform: linux-arm64
            os: ubuntu-24.04-arm

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn -B package --file pom.xml

      - name: Upload artifacts
        uses: actions/upload-artifact@v6
        with:
          name: chess-engine-tester-${{ matrix.platform }}
          path: cli/target/chess-engine-tester-*.zip
          if-no-files-found: error
          retention-days: 30
